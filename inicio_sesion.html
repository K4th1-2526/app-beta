<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <title>Iniciar sesion con email</title>
  <link rel="icon" type="webtoon.png" href="webtoon.png"/>
</head>
<body>

  <!-- Imagen / Logo -->
  <img src="webtoon.png" alt="Logo" width="80" height="80"/>
<style>
    body {
      text-align: center;
    }
  </style>

</head>
  <!-- Titulo con flecha de volver -->
  <h1>< Iniciar sesion con email</h1>

  <!-- Label e Input: Correo electronico -->
  <label for="correo">Correo electronico</label>
  <br/>
  <input type="email" id="correo" placeholder="Ingrese su correo electronico"/>
  <br/><br/>

  <!-- Label e Input: Contraseña -->
  <label for="password">Contraseña</label>
  <br/>
  <input type="password" id="password" placeholder="Ingrese su contraseña"/>
  <br/><br/>

  <!-- Hipervinculo: Olvide contraseña -->
  <a href="#">¿ Olvidaste tu contraseña?</a>
  <br/><br/>

  <!-- Boton: Iniciar sesion -->
  <button>Iniciar sesion</button>
  <br/><br/>

  <!-- Hipervinculo: Registrarse -->
  <a href="#">¿ No tienes cuenta? Registrate</a>

</body>
</html>
